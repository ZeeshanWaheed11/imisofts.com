name: Fix disclosures
on:
  push:
    branches: [main]
    paths:
      - 'ops/fix_disclosures.py'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fix affiliate disclosures (orphans + re-add CTAs)
        run: python3 ops/fix_disclosures.py
      - name: Commit changes
        run: |
          git config user.name "imisofts-news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "no changes"; else
            git commit -m "fix: remove orphan affiliate disclosures + re-add Apollo/Instantly CTAs"
            git push
          fi
