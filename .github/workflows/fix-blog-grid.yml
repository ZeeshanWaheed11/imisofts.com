name: Fix blog grid
on:
  push:
    branches: [main]
    paths:
      - 'ops/fix_blog_grid.py'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Move stranded cards into the grid
        run: python3 ops/fix_blog_grid.py
      - name: Commit changes
        run: |
          git config user.name "imisofts-news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "no changes"; else
            git commit -m "fix: move stranded /blog cards into posts-grid (remove dead load-more-wrap)"
            git push
          fi
