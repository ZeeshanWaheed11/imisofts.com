name: Publish news
on:
  push:
    branches: [main]
    paths:
      - 'content/news/**'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build news articles and indexes
        run: python3 ops/build_news.py
      - name: Commit generated files
        run: |
          git config user.name "imisofts-news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "build: publish news article(s)"
            git push
          fi
